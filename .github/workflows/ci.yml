name: CI

on:
  push:
    branches: [main]
  pull_request:

# Required repo secrets (GitHub → Settings → Secrets and variables → Actions):
#   NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY
#   CYPRESS_OWNER_EMAIL, CYPRESS_OWNER_PASSWORD

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Check E2E secret availability
        id: e2e-secrets
        shell: bash
        env:
          CYPRESS_OWNER_EMAIL: ${{ secrets.CYPRESS_OWNER_EMAIL }}
          CYPRESS_OWNER_PASSWORD: ${{ secrets.CYPRESS_OWNER_PASSWORD }}
        run: |
          missing=0
          for var in \
            NEXT_PUBLIC_SUPABASE_URL \
            NEXT_PUBLIC_SUPABASE_ANON_KEY \
            CYPRESS_OWNER_EMAIL \
            CYPRESS_OWNER_PASSWORD
          do
            if [ -z "${!var}" ]; then
              echo "Missing $var"
              missing=1
            fi
          done
          if [ "$missing" -eq 0 ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: E2E (Cypress)
        if: steps.e2e-secrets.outputs.run == 'true'
        uses: cypress-io/github-action@v6
        with:
          install: false
          start: npm run start
          wait-on: http://localhost:3000/login
          wait-on-timeout: 120
          command: npx cypress run --spec cypress/e2e/auth.cy.ts,cypress/e2e/clients.cy.ts,cypress/e2e/command-palette.cy.ts,cypress/e2e/wallpaper.cy.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          CYPRESS_OWNER_EMAIL: ${{ secrets.CYPRESS_OWNER_EMAIL }}
          CYPRESS_OWNER_PASSWORD: ${{ secrets.CYPRESS_OWNER_PASSWORD }}

      - name: Skip E2E when secrets are unavailable
        if: steps.e2e-secrets.outputs.run != 'true'
        run: echo "Skipping owner-only Cypress because required Supabase/owner secrets are not configured for this run."

      - name: Upload Cypress screenshots on failure
        if: failure() && steps.e2e-secrets.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore
